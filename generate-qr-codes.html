<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo mã QR cho thiết bị</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #1a73e8; margin-bottom: 20px; }
    .input-section { margin-bottom: 30px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
    input, textarea { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 14px; }
    textarea { min-height: 150px; font-family: monospace; }
    button { background: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; margin-right: 10px; }
    button:hover { background: #1557b0; }
    .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
    .qr-item { border: 2px solid #e0e0e0; border-radius: 8px; padding: 15px; text-align: center; background: white; }
    .qr-item canvas { max-width: 100%; height: auto; margin: 10px 0; }
    .qr-item h3 { color: #1a73e8; margin-bottom: 10px; font-size: 16px; }
    .qr-item p { color: #666; font-size: 12px; word-break: break-all; margin-bottom: 10px; }
    .download-btn { background: #2e7d32; font-size: 13px; padding: 8px 16px; }
    .download-btn:hover { background: #1b5e20; }
    .print-btn { background: #f57c00; }
    .print-btn:hover { background: #e65100; }
    @media print {
      body { background: white; }
      .container { box-shadow: none; }
      .input-section, button { display: none; }
      .qr-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔲 Tạo mã QR cho thiết bị</h1>
    
    <div class="input-section">
      <label>URL website của bạn:</label>
      <input type="text" id="baseUrl" value="https://it-incident-management.vercel.app" placeholder="https://yoursite.com">
    </div>
    
    <div class="input-section">
      <label>Danh sách mã thiết bị (mỗi dòng 1 mã):</label>
      <textarea id="deviceCodes" placeholder="PC001&#10;PC002&#10;PRINTER-01&#10;PROJECTOR-01"></textarea>
    </div>
    
    <button onclick="generateQRCodes()">🔲 Tạo mã QR</button>
    <button onclick="window.print()" class="print-btn">🖨️ In tất cả</button>
    <button onclick="downloadAll()" style="background: #7b1fa2;">📥 Tải tất cả</button>
    
    <div id="qrGrid" class="qr-grid"></div>
  </div>

  <script>
    const qrCodes = [];
    
    function generateQRCodes() {
      const baseUrl = document.getElementById('baseUrl').value.trim();
      const deviceCodes = document.getElementById('deviceCodes').value.trim().split('\n').filter(code => code.trim());
      
      if (!baseUrl) {
        alert('Vui lòng nhập URL website!');
        return;
      }
      
      if (deviceCodes.length === 0) {
        alert('Vui lòng nhập ít nhất 1 mã thiết bị!');
        return;
      }
      
      const qrGrid = document.getElementById('qrGrid');
      qrGrid.innerHTML = '';
      qrCodes.length = 0;
      
      deviceCodes.forEach((deviceCode, index) => {
        const code = deviceCode.trim();
        if (!code) return;
        
        const url = `${baseUrl}/?device=${encodeURIComponent(code)}`;
        
        // Create QR item
        const qrItem = document.createElement('div');
        qrItem.className = 'qr-item';
        qrItem.innerHTML = `
          <h3>${code}</h3>
          <canvas id="qr-${index}"></canvas>
          <p>${url}</p>
          <button class="download-btn" onclick="downloadQR(${index}, '${code}')">📥 Tải xuống</button>
        `;
        qrGrid.appendChild(qrItem);
        
        // Generate QR code
        const canvas = document.getElementById(`qr-${index}`);
        QRCode.toCanvas(canvas, url, {
          width: 200,
          margin: 2,
          color: {
            dark: '#000000',
            light: '#FFFFFF'
          }
        }, function (error) {
          if (error) console.error(error);
        });
        
        qrCodes.push({ code, canvas, url });
      });
    }
    
    function downloadQR(index, deviceCode) {
      const canvas = document.getElementById(`qr-${index}`);
      const link = document.createElement('a');
      link.download = `QR-${deviceCode}.png`;
      link.href = canvas.toDataURL();
      link.click();
    }
    
    function downloadAll() {
      qrCodes.forEach((item, index) => {
        setTimeout(() => {
          const link = document.createElement('a');
          link.download = `QR-${item.code}.png`;
          link.href = item.canvas.toDataURL();
          link.click();
        }, index * 200); // Delay to avoid browser blocking
      });
    }
    
    // Auto-generate example on load
    window.addEventListener('load', function() {
      document.getElementById('deviceCodes').value = 'PC001\nPC002\nPRINTER-01\nPROJECTOR-01';
    });
  </script>
</body>
</html>
